services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: server

    restart: unless-stopped

    env_file:
      - ../config/.env

    container_name: top-search-server

    ports:
      - "${GRPC_PORT:-50051}:50051"
      - "${METRICS_PORT:-2112}:2112"

    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ../config:/config:ro

    init: true

    stop_grace_period: 30s

    security_opt:
      - no-new-privileges:true

    networks:
      - backend

  nats:
    image: nats:2.14.1-alpine

    container_name: top-search-nats

    restart: unless-stopped

    command:
      - "--name=top-search-nats"
      - "--http_port=8222"
      - "--js"
      - "--sd=/data"

    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITORING_PORT:-8222}:8222"

    volumes:
      - nats-data:/data

    healthcheck:
      test:
        [ "CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz?js-enabled-only=true >/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    security_opt:
      - no-new-privileges:true

    networks:
      - backend

  redis:
    image: redis:8-alpine

    container_name: top-search-redis

    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
      - --loglevel
      - warning

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "ping"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    security_opt:
      - no-new-privileges:true

    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: top-search-prometheus
    restart: unless-stopped

    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle

    networks:
      - backend

  grafana:
    image: grafana/grafana:13.0
    container_name: top-search-grafana
    restart: unless-stopped

    ports:
      - "${GRAFANA_PORT:-3000}:3000"

    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"

    volumes:
      - ./grafana/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana

    depends_on:
      prometheus:
        condition: service_started

    networks:
      - backend

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.20.0
    container_name: top-search-nats-exporter
    restart: unless-stopped

    ports:
      - "${NATS_EXPORTER_PORT:-7777}:7777"

    command:
      - -varz
      - -connz
      - http://nats:8222

    depends_on:
      nats:
        condition: service_healthy

    networks:
      - backend

volumes:
  nats-data:
    driver: local

  redis-data:
    driver: local

  prometheus-data:
    driver: local

  grafana-data:
    driver: local

networks:
  backend:
    driver: bridge
